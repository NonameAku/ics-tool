<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ICS完全版</title>
<style>
body { font-family: sans-serif; }
button { margin-left: 5px; }
</style>
</head>
<body>

<h2>ICSカレンダー作成ツール</h2>

タイトル: <input id="title" value="予定"><br><br>

期間開始: <input type="date" id="startDate">
期間終了: <input type="date" id="endDate"><br><br>

<h3>週間テンプレ</h3>
<p>例: 13:00-18:00,21:00-24:00</p>

月 <input id="mon"> 終日 <input type="checkbox" id="monAll"><br>
火 <input id="tue"> 終日 <input type="checkbox" id="tueAll"><br>
水 <input id="wed"> 終日 <input type="checkbox" id="wedAll"><br>
木 <input id="thu"> 終日 <input type="checkbox" id="thuAll"><br>
金 <input id="fri"> 終日 <input type="checkbox" id="friAll"><br>
土 <input id="sat"> 終日 <input type="checkbox" id="satAll"><br>
日 <input id="sun"> 終日 <input type="checkbox" id="sunAll"><br><br>

<h3>個別予定</h3>
日付 <input type="date" id="pickDate">
時間 <input id="pickTime" placeholder="空欄で終日">
<button onclick="addCustom()">追加</button>
<ul id="dateList"></ul>

<h3>除外日</h3>
日付 <input type="date" id="excludeDate">
<button onclick="addExclude()">追加</button>
<ul id="excludeList"></ul>

<br>
<button onclick="generate()">ICSダウンロード</button>

<script>

// ===== データ =====
let customEntries = [];
let customDateSet = new Set();
let excludeDates = new Set();

const dayMap = {0:"sun",1:"mon",2:"tue",3:"wed",4:"thu",5:"fri",6:"sat"};
const dayLabel = {0:"日",1:"月",2:"火",3:"水",4:"木",5:"金",6:"土"};

// ===== 保存 =====
function saveData(){
  localStorage.setItem("customEntries", JSON.stringify(customEntries));
  localStorage.setItem("excludeDates", JSON.stringify([...excludeDates]));
}

// ===== 読み込み =====
function loadData(){
  customEntries = JSON.parse(localStorage.getItem("customEntries") || "[]");
  excludeDates = new Set(JSON.parse(localStorage.getItem("excludeDates") || "[]"));

  customEntries.forEach(e=>{
    renderCustom(e);
    customDateSet.add(e.date);
  });

  excludeDates.forEach(d=>{
    renderExclude(d);
  });
}

// ===== UI描画 =====
function renderCustom(entry){
  const li = document.createElement("li");
  li.textContent = entry.date + (entry.time ? " "+entry.time : " 終日") + " ";

  const btn = document.createElement("button");
  btn.textContent = "削除";

  btn.onclick = ()=>{
    customEntries = customEntries.filter(e => e !== entry);
    customDateSet.delete(entry.date);
    li.remove();
    saveData();
  };

  li.appendChild(btn);
  dateList.appendChild(li);
}

function renderExclude(date){
  const li = document.createElement("li");
  li.textContent = date + "（除外） ";

  const btn = document.createElement("button");
  btn.textContent = "削除";

  btn.onclick = ()=>{
    excludeDates.delete(date);
    li.remove();
    saveData();
  };

  li.appendChild(btn);
  excludeList.appendChild(li);
}

// ===== 追加 =====
function addCustom(){
  const date = pickDate.value;
  const time = pickTime.value;
  if(!date) return;

  const entry = {date,time};
  customEntries.push(entry);
  customDateSet.add(date);

  renderCustom(entry);
  saveData();

  pickTime.value="";
}

function addExclude(){
  const date = excludeDate.value;
  if(!date) return;

  excludeDates.add(date);
  renderExclude(date);
  saveData();
}

// ===== 日時処理 =====
function formatDate(dateObj, timeStr){
  let [h,m] = timeStr.split(":").map(Number);
  let d = new Date(dateObj);

  if(h>=24){
    d.setDate(d.getDate()+Math.floor(h/24));
    h = h % 24;
  }

  return d.getFullYear() +
    ("0"+(d.getMonth()+1)).slice(-2) +
    ("0"+d.getDate()).slice(-2) + "T" +
    ("0"+h).slice(-2) +
    ("0"+m).slice(-2) + "00";
}

function formatAllDay(d){
  return d.getFullYear() +
    ("0"+(d.getMonth()+1)).slice(-2) +
    ("0"+d.getDate()).slice(-2);
}

// ===== 生成 =====
function generate(){

  const title = document.getElementById("title").value;
  const start = new Date(startDate.value);
  const end = new Date(endDate.value);

  let ics = `BEGIN:VCALENDAR
VERSION:2.0
CALSCALE:GREGORIAN`;

  // 個別（最優先）
  customEntries.forEach(e=>{
    if(excludeDates.has(e.date)) return;

    let d = new Date(e.date);

    if(!e.time){
      let endD = new Date(d);
      endD.setDate(endD.getDate()+1);

      ics += `
BEGIN:VEVENT
DTSTART;VALUE=DATE:${formatAllDay(d)}
DTEND;VALUE=DATE:${formatAllDay(endD)}
SUMMARY:${title}
END:VEVENT`;
    } else {
      e.time.split(",").forEach(r=>{
        let [s,e2] = r.split("-");
        ics += `
BEGIN:VEVENT
DTSTART:${formatDate(d,s)}
DTEND:${formatDate(d,e2)}
SUMMARY:${title}
END:VEVENT`;
      });
    }
  });

  // 週間テンプレ
  let current = new Date(start);

  while(current <= end){

    let dateStr = current.toISOString().slice(0,10);

    if(excludeDates.has(dateStr) || customDateSet.has(dateStr)){
      current.setDate(current.getDate()+1);
      continue;
    }

    let day = current.getDay();
    let id = dayMap[day];

    let timeInput = document.getElementById(id).value;
    let isAllDay = document.getElementById(id+"All").checked;

    let times = timeInput ? timeInput.split(",") : [];

    if(isAllDay || timeInput){
      ics += createWeeklyEvent(current, times, title + `（${dayLabel[day]}）`, isAllDay);
    }

    current.setDate(current.getDate()+1);
  }

  ics += "\nEND:VCALENDAR";

  const blob = new Blob([ics], {type:"text/calendar"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);

  const now = new Date();
  const name = now.getFullYear()+
    ("0"+(now.getMonth()+1)).slice(-2)+
    ("0"+now.getDate()).slice(-2)+
    ("0"+now.getHours()).slice(-2)+
    ("0"+now.getMinutes()).slice(-2);

  a.download = `${name}_schedule.ics`;
  a.click();
}

// 週間イベント
function createWeeklyEvent(date, times, title, isAllDay){

  if(isAllDay){
    let start = formatAllDay(date);
    let end = new Date(date);
    end.setDate(end.getDate()+1);

    return `
BEGIN:VEVENT
DTSTART;VALUE=DATE:${start}
DTEND;VALUE=DATE:${formatAllDay(end)}
SUMMARY:${title}
END:VEVENT`;
  }

  let events = "";

  times.forEach(range=>{
    let [s,e] = range.split("-");
    events += `
BEGIN:VEVENT
DTSTART:${formatDate(date,s)}
DTEND:${formatDate(date,e)}
SUMMARY:${title}
END:VEVENT`;
  });

  return events;
}

// 初期化
loadData();

</script>
</body>
</html>
